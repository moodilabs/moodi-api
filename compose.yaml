services:
  postgres:
    image: postgis/postgis:17-3.5
    platform: linux/amd64
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: moodi
      POSTGRES_USER: moodi
      POSTGRES_PASSWORD: moodi
    volumes:
      - postgres_data:/var/lib/postgresql/data
    labels:
      org.springframework.boot.service-connection: postgres
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U moodi -d moodi" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
