spring:
  docker:
    compose:
      enabled: false

  datasource:
    url: jdbc:postgresql:///moodi?cloudSqlInstance=moodi-app-2026:asia-northeast3:moodi-db&socketFactory=com.google.cloud.sql.postgres.SocketFactory
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
