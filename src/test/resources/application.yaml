spring:
  datasource:
    url: jdbc:h2:mem:test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  docker:
    compose:
      enabled: false

jwt:
  secret: test-secret-key-for-jwt-hs256-must-be-at-least-32-bytes
  access-token-expiry-ms: 1800000
  refresh-token-expiry-ms: 1209600000

oauth:
  google:
    issuer: https://accounts.google.com
    audiences: test-google-client-id
    jwks-uri: https://www.googleapis.com/oauth2/v3/certs
  apple:
    issuer: https://appleid.apple.com
    audiences: test-apple-client-id
    jwks-uri: https://appleid.apple.com/auth/keys
