name: Deploy

on:
  push:
    branches: [develop]

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: moodi-app-2026
  REGION: asia-northeast3
  SERVICE: moodi-api
  IMAGE: asia-northeast3-docker.pkg.dev/moodi-app-2026/moodi-repo/moodi-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - run: ./gradlew bootJar

      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: projects/954020560650/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions@moodi-app-2026.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2

      - run: gcloud auth configure-docker asia-northeast3-docker.pkg.dev --quiet

      - run: docker build --platform linux/amd64 -t ${{ env.IMAGE }}:${{ github.sha }} -t ${{ env.IMAGE }}:latest .

      - run: docker push --all-tags ${{ env.IMAGE }}

      - name: Verify required secrets
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          APPLE_CLIENT_ID: ${{ secrets.APPLE_CLIENT_ID }}
        run: |
          missing=0
          for name in JWT_SECRET GOOGLE_CLIENT_ID APPLE_CLIENT_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::Required secret $name is not set"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ]

      - name: Deploy to Cloud Run
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          APPLE_CLIENT_ID: ${{ secrets.APPLE_CLIENT_ID }}
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=1Gi \
            --add-cloudsql-instances=moodi-app-2026:asia-northeast3:moodi-db \
            --update-env-vars="^@^SPRING_PROFILES_ACTIVE=prod@JWT_SECRET=${JWT_SECRET}@GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}@APPLE_CLIENT_ID=${APPLE_CLIENT_ID}"
